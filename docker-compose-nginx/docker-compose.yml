version: '3.8'

networks:
  ceyhun-network:
    driver: bridge

volumes:
  nginx-logs:

services:
  nginx:
    image: nginx:latest
    container_name: ceyhun-nginx
    ports:
      - "8080:80"
    volumes:
      - ./app:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - nginx-logs:/var/log/nginx
    networks:
      - ceyhun-network
    restart: always
